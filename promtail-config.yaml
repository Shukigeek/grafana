server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: drone-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /drone.*
        action: keep
      - source_labels: [__meta_docker_container_name]
        target_label: drone_id
        regex: /(.*)
        replacement: $1
      - target_label: job
        replacement: drone-simulator
      - source_labels: [__meta_docker_container_name]
        target_label: container
    pipeline_stages:
      - regex:
          expression: '.*\[(?P<level>[A-Z]+)\s*\].*'
      - labels:
          level: